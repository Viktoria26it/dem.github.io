<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Портфолио проектов | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ⬅️ Вставьте сюда ВСЕ ваши стили из оригинального кода */
        /* (они уже отличные — просто оставьте как есть) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --secondary: #8b5cf6; --accent: #10b981;
            --dark: #1e1b4b; --light: #f8fafc;
            --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1e1b4b 50%, #312e81 100%);
            min-height: 100vh; color: var(--light); line-height: 1.6;
        }
        /* ...остальные ваши стили... */
        /* Для краткости не дублирую весь CSS — используйте ваш оригинальный */
    </style>
</head>
<body>
    <!-- ⬅️ Вставьте сюда ВСЁ содержимое <body> из вашего кода -->
    <!-- Навигация, карточки проектов, файлы, футер — всё как у вас -->
    
    <!-- ⚠️ УДАЛИТЕ блок <dib>...</dib> полностью! -->
    
    <script>
        // Ваш оригинальный JS для анимаций и плавного скролла
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.project-card, .file-item').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(20px)';
            el.style.transition = 'all 0.6s ease';
            observer.observe(el);
        });
    </script>
</body>
</html>
